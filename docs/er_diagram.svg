<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px sans-serif; fill: #475569; }
      .table { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .table-head { fill: #dbeafe; stroke: #334155; stroke-width: 2; rx: 12; }
      .table-name { font: 700 23px sans-serif; fill: #0f172a; }
      .col { font: 16px monospace; fill: #0f172a; }
      .note { font: 15px sans-serif; fill: #475569; }
      .relation { stroke: #334155; stroke-width: 3; fill: none; }
      .card { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 12; }
      .card-title { font: 700 18px sans-serif; fill: #9a3412; }
      .card-text { font: 15px sans-serif; fill: #7c2d12; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="850"/>
  <text x="60" y="60" class="title">いつもの交通費メモ ER図</text>
  <text x="60" y="94" class="subtitle">同じ訪問先に複数ルートを登録できるよう、訪問先を destinations として切り出します。</text>

  <!-- users table -->
  <g transform="translate(70 180)">
    <rect class="table" width="430" height="420"/>
    <rect class="table-head" width="430" height="66"/>
    <text x="28" y="42" class="table-name">users</text>
    <text x="28" y="100" class="col">id : bigint PK</text>
    <text x="28" y="140" class="col">name : string NOT NULL</text>
    <text x="28" y="180" class="col">email : string NOT NULL UNIQUE</text>
    <text x="28" y="220" class="col">crypted_password : string NOT NULL</text>
    <text x="28" y="260" class="col">salt : string NOT NULL</text>
    <text x="28" y="300" class="col">created_at : datetime NOT NULL</text>
    <text x="28" y="340" class="col">updated_at : datetime NOT NULL</text>
  </g>

  <!-- destinations table -->
  <g transform="translate(590 220)">
    <rect class="table" width="390" height="330"/>
    <rect class="table-head" width="390" height="66"/>
    <text x="28" y="42" class="table-name">destinations</text>
    <text x="28" y="100" class="col">id : bigint PK</text>
    <text x="28" y="140" class="col">user_id : bigint FK NOT NULL</text>
    <text x="28" y="180" class="col">name : string NOT NULL</text>
    <text x="28" y="220" class="col">created_at : datetime NOT NULL</text>
    <text x="28" y="260" class="col">updated_at : datetime NOT NULL</text>
  </g>

  <!-- travel_expense_memos table -->
  <g transform="translate(1070 170)">
    <rect class="table" width="460" height="440"/>
    <rect class="table-head" width="460" height="66"/>
    <text x="28" y="42" class="table-name">travel_expense_memos</text>
    <text x="28" y="100" class="col">id : bigint PK</text>
    <text x="28" y="140" class="col">destination_id : bigint FK NOT NULL</text>
    <text x="28" y="180" class="col">departure_place : string NOT NULL</text>
    <text x="28" y="220" class="col">arrival_place : string NOT NULL</text>
    <text x="28" y="260" class="col">one_way_fare : integer NOT NULL</text>
    <text x="28" y="300" class="col">created_at : datetime NOT NULL</text>
    <text x="28" y="340" class="col">updated_at : datetime NOT NULL</text>
  </g>

  <!-- users to destinations relation -->
  <path class="relation" d="M500 385 L590 385"/>
  <text x="525" y="357" class="note">1</text>
  <text x="560" y="357" class="note">0..N</text>
  <path class="relation" d="M515 365 L515 405"/>
  <path class="relation" d="M530 365 L530 405"/>
  <circle cx="555" cy="385" r="10" stroke="#334155" stroke-width="3" fill="#f8fafc"/>
  <path class="relation" d="M570 385 L590 385"/>
  <path class="relation" d="M570 385 L590 365"/>
  <path class="relation" d="M570 385 L590 405"/>

  <!-- destinations to travel_expense_memos relation -->
  <path class="relation" d="M980 385 L1070 385"/>
  <text x="1005" y="357" class="note">1</text>
  <text x="1040" y="357" class="note">0..N</text>
  <path class="relation" d="M995 365 L995 405"/>
  <path class="relation" d="M1010 365 L1010 405"/>
  <circle cx="1035" cy="385" r="10" stroke="#334155" stroke-width="3" fill="#f8fafc"/>
  <path class="relation" d="M1050 385 L1070 385"/>
  <path class="relation" d="M1050 385 L1070 365"/>
  <path class="relation" d="M1050 385 L1070 405"/>

  <!-- notes -->
  <g transform="translate(70 690)">
    <rect class="card" width="1460" height="92"/>
    <text x="24" y="30" class="card-title">ER図に含めないもの</text>
    <text x="24" y="56" class="card-text">往復料金は片道料金から自動計算して表示します。応援メッセージ画像は登録完了後の固定表示のため、DBには保存しません。</text>
    <text x="24" y="78" class="card-text">MVPでは訪問先の詳細管理は行わず、destinations には訪問先名のみを保存します。</text>
  </g>
</svg>
