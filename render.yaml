services:
  - type: web
    name: itsumo-transportation-memo
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: itsumo-transportation-memo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MAX_THREADS
        value: 3

databases:
  - name: itsumo-transportation-memo-db
    plan: free
    databaseName: graduation_app_production
    user: graduation_app
